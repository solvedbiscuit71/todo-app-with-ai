<h1 class="todo-list__header">
    <div class="todo-list__label">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#f0f0eb"><path d="M40-440v-80h240v80H40Zm270-154-84-84 56-56 84 84-56 56Zm130-86v-240h80v240h-80Zm210 86-56-56 84-84 56 56-84 84Zm30 154v-80h240v80H680Zm-285 45q-35-35-35-85t35-85q35-35 85-35t85 35q35 35 35 85t-35 85q-35 35-85 35t-85-35Zm283 169-84-84 56-56 84 84-56 56Zm-396 0-56-56 84-84 56 56-84 84ZM440-40v-240h80v240h-80Z"/></svg>
        <span>My Day ({{todoList().length}}) </span>
    </div>
    <button class="button button__primary" (click)="showForm()">
        <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="#fafaf7"><path d="M440-120v-320H120v-80h320v-320h80v320h320v80H520v320h-80Z"/></svg>
    </button>
</h1>

<ul class="todo-list">
    @if (showNewTodo()) {
        <app-new-todo-form (cancelled)="hideForm()" />
    }

    @for (todo of todoList(); track todo.id) {
        <app-todo-item [value]="todo" [class.todo-item__first]="$first" [class.todo-item__last]="$last" />
    }
</ul>
